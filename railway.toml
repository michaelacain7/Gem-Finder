[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# For persistent scheduler mode:
startCommand = "python scheduler.py"
healthcheckPath = ""
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# For cron mode (run once daily), comment above and uncomment below:
# startCommand = "python gem_finder.py"
# cronSchedule = "0 11 * * *"  # 6 AM ET / 11 AM UTC
